let T={x:0,y:0,s:1},CX,CY,dragging=false,sx,sy,stx,sty;
const ml=document.getElementById('ml'),sl=document.getElementById('sl');

function r2d(d){return d*Math.PI/180;}
function gp(cx,cy,deg,dist){return{x:cx+Math.cos(r2d(deg))*dist,y:cy+Math.sin(r2d(deg))*dist};}

function mk(tag,cls){const e=document.createElement(tag);e.className=cls;return e;}

function ln(x1,y1,x2,y2,stroke,sw,op,dash){
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',stroke);l.setAttribute('stroke-width',sw);l.setAttribute('stroke-opacity',op);
  if(dash)l.setAttribute('stroke-dasharray',dash);
  sl.appendChild(l);return l;
}

function build(){
  CX=window.innerWidth/2; CY=window.innerHeight/2;
  ml.innerHTML=''; sl.innerHTML=''; applyT();

  const c=mk('div','cn');
  c.style.cssText=`left:${CX}px;top:${CY}px`;
  c.innerHTML=`<div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ct">Svensk<br>OSINT</div><div class="cs">V.12 · MARS 2026</div>`;
  ml.appendChild(c);

  D.forEach(cat=>{
    const cp=gp(CX,CY,cat.a,cat.d);
    ln(CX,CY,cp.x,cp.y,cat.color,1.5,.32,'');
    const cn=mk('div',`catn ${cat.cs}`);
    cn.style.cssText=`left:${cp.x}px;top:${cp.y}px`;
    cn.dataset.cid=cat.id;
    cn.innerHTML=`<span class="cdot" style="background:${cat.color}"></span>${cat.l}`;
    cn.onclick=e=>{e.stopPropagation();actCat(cat,cn);};
    ml.appendChild(cn);

    cat.subs.forEach(sub=>{
      const sp=gp(CX,CY,sub.a,sub.d);
      ln(cp.x,cp.y,sp.x,sp.y,cat.color,1,.17,'4,5');
      const sn=mk('div',`subn ss${cat.id.charAt(0).toUpperCase()}${cat.id.slice(1)}`);
      sn.className=`subn ss${cat.id[0].toUpperCase()+cat.id.slice(1)}`;
      sn.style.cssText=`left:${sp.x}px;top:${sp.y}px;position:absolute`;
      sn.dataset.sid=sub.id; sn.dataset.cid=cat.id;
      sn.textContent=sub.l;
      const b=mk('span','sbadge');
      b.textContent=sub.arts.length; b.style.background=cat.color;
      sn.appendChild(b);
      sn.onclick=e=>{e.stopPropagation();openP(cat,sub);};
      ml.appendChild(sn);
    });
  });
}

function openP(cat,sub){
  document.getElementById('pr').textContent=cat.l.toUpperCase();
  document.getElementById('pr').style.color=cat.color;
  document.getElementById('pt').textContent=sub.l;
  document.getElementById('pc').textContent=`${sub.arts.length} INLÄGG / ARTIKLAR`;
  const list=document.getElementById('pl');
  list.innerHTML='';
  sub.arts.forEach(art=>{
    const a=document.createElement('a');
    a.className='ai'; a.href=art.u; a.target='_blank'; a.rel='noopener noreferrer';
    a.innerHTML=`<div class="ait">${art.t}</div><div class="aim"><span style="color:${cat.color};font-size:7px">●</span>${cat.l}<span style="opacity:.4">↗</span></div>`;
    list.appendChild(a);
  });
  document.querySelectorAll('.subn').forEach(n=>n.classList.remove('act'));
  document.querySelector(`[data-sid="${sub.id}"]`)?.classList.add('act');
  document.getElementById('panel').classList.add('open');
}

function closeP(){
  document.getElementById('panel').classList.remove('open');
  document.querySelectorAll('.subn').forEach(n=>n.classList.remove('act'));
}

function fcat(id){
  document.querySelectorAll('.catn').forEach(n=>n.style.opacity=(!id||n.dataset.cid===id)?'1':'.15');
  document.querySelectorAll('.subn').forEach(n=>n.style.opacity=(!id||n.dataset.cid===id)?'1':'.08');
  sl.querySelectorAll('line').forEach(l=>l.style.opacity=id?(l.getAttribute('stroke')===(D.find(c=>c.id===id)?.color)?'1':'.08'):'1');
  if(!id)document.querySelectorAll('.catn').forEach(n=>n.classList.remove('act'));
}

function actCat(cat,node){
  document.querySelectorAll('.catn').forEach(n=>n.classList.remove('act'));
  node.classList.add('act'); fcat(cat.id);
}

function applyT(){
  const t=`translate(${T.x}px,${T.y}px) scale(${T.s})`;
  ml.style.transform=sl.style.transform=t;
  ml.style.transformOrigin=sl.style.transformOrigin='0 0';
}

document.addEventListener('mousedown',e=>{
  if(e.target.closest('#panel,#legend,#zc,#hud,#topbar'))return;
  dragging=true;sx=e.clientX;sy=e.clientY;stx=T.x;sty=T.y;
  document.body.classList.add('drag');
});
document.addEventListener('mousemove',e=>{
  if(!dragging)return;
  T.x=stx+e.clientX-sx; T.y=sty+e.clientY-sy; applyT();
});
document.addEventListener('mouseup',()=>{dragging=false;document.body.classList.remove('drag');});

document.addEventListener('wheel',e=>{
  if(e.target.closest('#panel'))return;
  e.preventDefault();
  const f=e.deltaY>0?.9:1.1;
  const ns=Math.min(Math.max(T.s*f,.22),3.2);
  const wx=(e.clientX-T.x)/T.s,wy=(e.clientY-T.y)/T.s;
  T.s=ns;T.x=e.clientX-wx*ns;T.y=e.clientY-wy*ns;applyT();
},{passive:false});

function zm(f){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  const ns=Math.min(Math.max(T.s*f,.22),3.2);
  const wx=(cx-T.x)/T.s,wy=(cy-T.y)/T.s;
  T.s=ns;T.x=cx-wx*ns;T.y=cy-wy*ns;applyT();
}
function rv(){T={x:0,y:0,s:1};applyT();}

document.getElementById('cw').addEventListener('click',e=>{
  if(['cw','ml','sl'].includes(e.target.id)){closeP();fcat(null);}
});

window.addEventListener('load',()=>{
  build();
  let n=0;D.forEach(c=>c.subs.forEach(s=>n+=s.arts.length));
  console.log(`Svensk OSINT Mindmap – totalt ${n} artiklar inlästa`);
});
window.addEventListener('resize',build);
</script>
