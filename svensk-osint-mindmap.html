<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #1a1d25;
    --border: #2a2d3a;
    --accent-sverige: #4a9eff;
    --accent-norden: #4aefb8;
    --accent-europa: #ef9b4a;
    --accent-ovriga: #ef4a7b;
    --text-primary: #e8eaf0;
    --text-secondary: #8890a8;
    --text-dim: #4a5068;
    --center-glow: #4a9eff;
    --line-color: #2a2d3a;
    --node-hover: #ffffff08;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'IBM Plex Sans', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: grab;
  }

  body.dragging { cursor: grabbing; }

  #canvas-container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #svg-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  #map-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    transform-origin: 0 0;
  }

  /* CENTER NODE */
  .center-node {
    position: absolute;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, #1a2240 0%, #0d1020 100%);
    border: 2px solid var(--accent-sverige);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    box-shadow: 0 0 40px #4a9eff33, 0 0 80px #4a9eff11;
    z-index: 10;
    transform: translate(-50%, -50%);
    cursor: default;
  }

  .center-node .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--accent-sverige);
    text-transform: uppercase;
  }

  .center-node .week {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-secondary);
    margin-top: 4px;
    letter-spacing: 2px;
  }

  .center-node .pulse {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 1px solid var(--accent-sverige);
    animation: pulse 3s ease-out infinite;
    opacity: 0;
  }

  .center-node .pulse:nth-child(2) { animation-delay: 1s; }
  .center-node .pulse:nth-child(3) { animation-delay: 2s; }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.4; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* CATEGORY NODES */
  .cat-node {
    position: absolute;
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transform: translate(-50%, -50%);
    z-index: 8;
    border: 1.5px solid transparent;
    transition: all 0.25s ease;
    min-width: 130px;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    user-select: none;
  }

  .cat-node:hover { filter: brightness(1.3); transform: translate(-50%, -50%) scale(1.05); }
  .cat-node.active { filter: brightness(1.4); transform: translate(-50%, -50%) scale(1.08); }

  .cat-sverige { background: #4a9eff15; border-color: var(--accent-sverige); color: var(--accent-sverige); box-shadow: 0 0 20px #4a9eff22; }
  .cat-norden  { background: #4aefb815; border-color: var(--accent-norden);  color: var(--accent-norden);  box-shadow: 0 0 20px #4aefb822; }
  .cat-europa  { background: #ef9b4a15; border-color: var(--accent-europa);  color: var(--accent-europa);  box-shadow: 0 0 20px #ef9b4a22; }
  .cat-ovriga  { background: #ef4a7b15; border-color: var(--accent-ovriga);  color: var(--accent-ovriga);  box-shadow: 0 0 20px #ef4a7b22; }

  .cat-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* SUBCATEGORY NODES */
  .sub-node {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 7;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
    max-width: 160px;
    text-align: center;
    transition: all 0.2s ease;
    user-select: none;
    line-height: 1.3;
  }

  .sub-node:hover {
    border-color: #4a5068;
    color: var(--text-primary);
    background: var(--surface2);
    transform: translate(-50%, -50%) scale(1.04);
    z-index: 20;
  }

  .sub-node.active {
    border-color: #4a5068;
    background: var(--surface2);
    color: var(--text-primary);
  }

  .sub-sverige:hover { border-color: var(--accent-sverige); }
  .sub-norden:hover  { border-color: var(--accent-norden); }
  .sub-europa:hover  { border-color: var(--accent-europa); }
  .sub-ovriga:hover  { border-color: var(--accent-ovriga); }

  /* ARTICLE PANEL */
  #article-panel {
    position: fixed;
    right: 0;
    top: 0;
    width: 380px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #article-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-category {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .panel-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .panel-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .panel-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }

  .panel-close:hover { border-color: var(--text-secondary); color: var(--text-primary); }

  .article-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .article-item {
    display: block;
    padding: 11px 13px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.15s;
    background: var(--bg);
    cursor: pointer;
  }

  .article-item:hover {
    border-color: #4a5068;
    background: var(--surface2);
    transform: translateX(2px);
  }

  .article-headline {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.4;
    margin-bottom: 5px;
  }

  .article-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .article-link-icon {
    font-size: 9px;
    opacity: 0.5;
  }

  /* HUD / INFO */
  #hud {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 50;
  }

  .hud-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  #zoom-controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 50;
  }

  .zoom-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .zoom-btn:hover { border-color: var(--text-secondary); color: var(--text-primary); }

  #title-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: linear-gradient(to bottom, var(--bg) 60%, transparent);
    z-index: 50;
    pointer-events: none;
  }

  .title-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--text-secondary);
    text-transform: uppercase;
  }

  .title-sep {
    width: 1px;
    height: 14px;
    background: var(--border);
  }

  .title-week {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  /* LEGEND */
  #legend {
    position: fixed;
    top: 50px;
    left: 16px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .legend-item:hover { background: var(--surface); }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* SVG lines */
  .line-sverige { stroke: var(--accent-sverige); }
  .line-norden  { stroke: var(--accent-norden); }
  .line-europa  { stroke: var(--accent-europa); }
  .line-ovriga  { stroke: var(--accent-ovriga); }
  .line-sub     { stroke: var(--border); }
  .line-center  { stroke-opacity: 0.4; stroke-width: 1.5; }
  .line-sub-edge { stroke-opacity: 0.25; stroke-width: 1; stroke-dasharray: 3,4; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%,-50%) scale(0.85); }
    to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }

  .node-enter { animation: fadeIn 0.3s ease forwards; }
</style>
</head>

// ============================================================
//  STATE
// ============================================================
let transform = { x: 0, y: 0, scale: 1 };
let centerX = 0, centerY = 0;
const mapLayer = document.getElementById('map-layer');
const svgLayer = document.getElementById('svg-layer');
let isDragging = false;
let startX, startY;
let activeFilter = null;

// ============================================================
//  GEOMETRY
// ============================================================
function angleToRad(deg) { return deg * Math.PI / 180; }

function getPos(cx, cy, angleDeg, dist) {
  const r = angleToRad(angleDeg);
  return { x: cx + Math.cos(r) * dist, y: cy + Math.sin(r) * dist };
}

// ============================================================
//  INIT
// ============================================================
function init() {
  centerX = window.innerWidth / 2;
  centerY = window.innerHeight / 2;

  // Set map layer transform
  mapLayer.style.transform = `translate(0,0) scale(1)`;

  buildMap();
  setupDrag();
  setupZoom();
}

function buildMap() {
  mapLayer.innerHTML = '';
  svgLayer.innerHTML = '';

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

  // Add radial gradient background
  const radGrad = document.createElementNS('http://www.w3.org/2000/svg', 'radialGradient');
  radGrad.id = 'centerGlow';
  radGrad.setAttribute('cx', '50%');
  radGrad.setAttribute('cy', '50%');
  radGrad.setAttribute('r', '50%');
  const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
  stop1.setAttribute('offset', '0%');
  stop1.setAttribute('stop-color', '#4a9eff');
  stop1.setAttribute('stop-opacity', '0.05');
  const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
  stop2.setAttribute('offset', '100%');
  stop2.setAttribute('stop-color', '#4a9eff');
  stop2.setAttribute('stop-opacity', '0');
  radGrad.appendChild(stop1);
  radGrad.appendChild(stop2);
  defs.appendChild(radGrad);
  svgLayer.appendChild(defs);

  // Center glow background
  const glowCircle = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
  glowCircle.setAttribute('cx', centerX);
  glowCircle.setAttribute('cy', centerY);
  glowCircle.setAttribute('rx', 400);
  glowCircle.setAttribute('ry', 400);
  glowCircle.setAttribute('fill', 'url(#centerGlow)');
  svgLayer.appendChild(glowCircle);

  // Create CENTER node
  const center = document.createElement('div');
  center.className = 'center-node';
  center.style.left = centerX + 'px';
  center.style.top = centerY + 'px';
  center.innerHTML = `
    <div class="pulse"></div>
    <div class="pulse"></div>
    <div class="pulse"></div>
    <div class="logo">Svensk<br>OSINT</div>
    <div class="week">V.12 · 2026</div>
  `;
  mapLayer.appendChild(center);

  // Build categories and subcategories
  DATA.categories.forEach(cat => {
    const catPos = getPos(centerX, centerY, cat.angle, cat.dist);

    // Line center → cat
    drawLine(centerX, centerY, catPos.x, catPos.y, cat.cls + '-line center-line line-center', cat.color);

    // Category node
    const catEl = document.createElement('div');
    catEl.className = `cat-node ${cat.cls}`;
    catEl.style.left = catPos.x + 'px';
    catEl.style.top = catPos.y + 'px';
    catEl.dataset.catId = cat.id;
    catEl.innerHTML = `<span class="cat-dot" style="background:${cat.color}"></span>${cat.label}`;
    catEl.addEventListener('click', (e) => { e.stopPropagation(); toggleCategory(cat, catPos); });
    mapLayer.appendChild(catEl);

    // Subcategories
    cat.subcategories.forEach(sub => {
      const subPos = getPos(centerX, centerY, sub.angle, sub.dist);

      // Line cat → sub
      drawLine(catPos.x, catPos.y, subPos.x, subPos.y, `line-sub line-sub-edge sub-line-${cat.id}`, cat.color, true);

      // Sub node
      const subEl = document.createElement('div');
      subEl.className = `sub-node sub-${cat.id}`;
      subEl.style.left = subPos.x + 'px';
      subEl.style.top = subPos.y + 'px';
      subEl.dataset.subId = sub.id;
      subEl.dataset.catId = cat.id;
      subEl.textContent = sub.label;
      subEl.title = `${sub.articles.length} artiklar`;
      subEl.addEventListener('click', (e) => {
        e.stopPropagation();
        openPanel(cat, sub);
      });
      mapLayer.appendChild(subEl);

      // Article count badge
      const badge = document.createElement('span');
      badge.style.cssText = `
        position:absolute;top:-7px;right:-7px;
        background:${cat.color};color:#0a0c10;
        border-radius:10px;padding:1px 5px;
        font-family:'IBM Plex Mono',monospace;
        font-size:8px;font-weight:600;
        pointer-events:none;
      `;
      badge.textContent = sub.articles.length;
      subEl.style.position = 'absolute';
      subEl.appendChild(badge);
    });
  });
}

function drawLine(x1, y1, x2, y2, classes, color, isDashed = false) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1);
  line.setAttribute('y1', y1);
  line.setAttribute('x2', x2);
  line.setAttribute('y2', y2);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', isDashed ? '1' : '1.5');
  line.setAttribute('stroke-opacity', isDashed ? '0.2' : '0.35');
  if (isDashed) line.setAttribute('stroke-dasharray', '3,5');
  line.setAttribute('class', classes);
  svgLayer.appendChild(line);
  return line;
}

// ============================================================
//  PANEL
// ============================================================
function openPanel(cat, sub) {
  const panel = document.getElementById('article-panel');
  const catLabel = document.getElementById('panel-cat-label');
  const subTitle = document.getElementById('panel-sub-title');
  const countEl = document.getElementById('panel-count');
  const list = document.getElementById('article-list');

  catLabel.textContent = cat.label.toUpperCase();
  catLabel.style.color = cat.color;
  subTitle.textContent = sub.label;
  countEl.textContent = `${sub.articles.length} ARTIKLAR / INLÄGG`;

  list.innerHTML = '';
  sub.articles.forEach((art, i) => {
    const item = document.createElement('a');
    item.className = 'article-item';
    item.href = art.url;
    item.target = '_blank';
    item.rel = 'noopener noreferrer';
    item.innerHTML = `
      <div class="article-headline">${art.title}</div>
      <div class="article-meta">
        <span style="color:${cat.color};font-size:8px">●</span>
        ${cat.label.toUpperCase()}
        <span class="article-link-icon">↗</span>
      </div>
    `;
    list.appendChild(item);
  });

  // Highlight active sub node
  document.querySelectorAll('.sub-node').forEach(n => n.classList.remove('active'));
  document.querySelectorAll(`[data-sub-id="${sub.id}"]`).forEach(n => n.classList.add('active'));

  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('article-panel').classList.remove('open');
  document.querySelectorAll('.sub-node').forEach(n => n.classList.remove('active'));
}

// ============================================================
//  FILTER
// ============================================================
function filterCategory(catId) {
  activeFilter = catId;
  const allCats = document.querySelectorAll('.cat-node');
  const allSubs = document.querySelectorAll('.sub-node');
  const allLines = svgLayer.querySelectorAll('line');

  if (!catId) {
    allCats.forEach(n => n.style.opacity = '1');
    allSubs.forEach(n => n.style.opacity = '1');
    allLines.forEach(l => l.style.opacity = '1');
  } else {
    allCats.forEach(n => {
      n.style.opacity = n.dataset.catId === catId ? '1' : '0.2';
    });
    allSubs.forEach(n => {
      n.style.opacity = n.dataset.catId === catId ? '1' : '0.15';
    });
  }
}

// ============================================================
//  DRAG & ZOOM
// ============================================================
function applyTransform() {
  mapLayer.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`;
  mapLayer.style.transformOrigin = '0 0';

  // Sync SVG elements
  const svgContent = svgLayer.querySelectorAll('*');
  svgLayer.style.transform = mapLayer.style.transform;
  svgLayer.style.transformOrigin = '0 0';
}

function setupDrag() {
  let startTX, startTY;

  document.addEventListener('mousedown', e => {
    if (e.target.closest('#article-panel') || e.target.closest('#legend') ||
        e.target.closest('#hud') || e.target.closest('#zoom-controls') ||
        e.target.closest('#title-bar')) return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startTX = transform.x;
    startTY = transform.y;
    document.body.classList.add('dragging');
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    transform.x = startTX + (e.clientX - startX);
    transform.y = startTY + (e.clientY - startY);
    applyTransform();
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
    document.body.classList.remove('dragging');
  });
}

function setupZoom() {
  document.addEventListener('wheel', e => {
    if (e.target.closest('#article-panel')) return;
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.min(Math.max(transform.scale * delta, 0.3), 2.5);

    // Zoom toward cursor
    const rect = document.getElementById('canvas-container').getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const worldX = (mouseX - transform.x) / transform.scale;
    const worldY = (mouseY - transform.y) / transform.scale;

    transform.scale = newScale;
    transform.x = mouseX - worldX * transform.scale;
    transform.y = mouseY - worldY * transform.scale;

    applyTransform();
  }, { passive: false });
}

function zoomIn() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const worldX = (cx - transform.x) / transform.scale;
  const worldY = (cy - transform.y) / transform.scale;
  transform.scale = Math.min(transform.scale * 1.2, 2.5);
  transform.x = cx - worldX * transform.scale;
  transform.y = cy - worldY * transform.scale;
  applyTransform();
}

function zoomOut() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const worldX = (cx - transform.x) / transform.scale;
  const worldY = (cy - transform.y) / transform.scale;
  transform.scale = Math.max(transform.scale / 1.2, 0.3);
  transform.x = cx - worldX * transform.scale;
  transform.y = cy - worldY * transform.scale;
  applyTransform();
}

function zoomReset() {
  transform = { x: 0, y: 0, scale: 1 };
  applyTransform();
}

function toggleCategory(cat, catPos) {
  // Highlight
  document.querySelectorAll('.cat-node').forEach(n => n.classList.remove('active'));
  document.querySelector(`[data-cat-id="${cat.id}"].cat-node`).classList.add('active');
  filterCategory(cat.id);
}

// Click on canvas to deselect
document.getElementById('canvas-container').addEventListener('click', e => {
  if (e.target === document.getElementById('canvas-container') ||
      e.target === document.getElementById('map-layer') ||
      e.target === document.getElementById('svg-layer')) {
    closePanel();
    filterCategory(null);
    document.querySelectorAll('.cat-node').forEach(n => n.classList.remove('active'));
  }
});

// ============================================================
//  START
// ============================================================
window.addEventListener('load', init);
window.addEventListener('resize', () => { init(); });
</script>
